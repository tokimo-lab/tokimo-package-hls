name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FFMPEG_REPO: tokimo-lab/tokimo-package-ffmpeg
  FFMPEG_RELEASE_TAG: nightly

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  linux:
    name: linux (build + clippy + test)
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - name: Install zstd
        run: sudo apt-get update && sudo apt-get install -y zstd

      - name: Download ffmpeg install (linux)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/ffmpeg"
          gh release download "$FFMPEG_RELEASE_TAG" \
            -R "$FFMPEG_REPO" \
            -p install-linux.tar.zst \
            -O "$RUNNER_TEMP/ffmpeg/install-linux.tar.zst"
          tar --zstd -xf "$RUNNER_TEMP/ffmpeg/install-linux.tar.zst" -C "$RUNNER_TEMP/ffmpeg"
          ls -la "$RUNNER_TEMP/ffmpeg/install/lib/pkgconfig"
          cat "$RUNNER_TEMP/ffmpeg/install/META.txt" || true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo clippy
        env:
          FFMPEG_PKG_CONFIG_PATH: ${{ runner.temp }}/ffmpeg/install/lib/pkgconfig
          FFMPEG_INCLUDE_DIR: ${{ runner.temp }}/ffmpeg/install/include
          FFMPEG_DYN_DIR: ${{ runner.temp }}/ffmpeg/install/lib
          LD_LIBRARY_PATH: ${{ runner.temp }}/ffmpeg/install/lib
          PKG_CONFIG_PATH: ${{ runner.temp }}/ffmpeg/install/lib/pkgconfig
        run: cargo clippy --lib --bins --tests -- -D warnings

      - name: cargo build
        env:
          FFMPEG_PKG_CONFIG_PATH: ${{ runner.temp }}/ffmpeg/install/lib/pkgconfig
          FFMPEG_INCLUDE_DIR: ${{ runner.temp }}/ffmpeg/install/include
          FFMPEG_DYN_DIR: ${{ runner.temp }}/ffmpeg/install/lib
          LD_LIBRARY_PATH: ${{ runner.temp }}/ffmpeg/install/lib
          PKG_CONFIG_PATH: ${{ runner.temp }}/ffmpeg/install/lib/pkgconfig
        run: cargo build --lib --bins --tests

      - name: cargo test
        env:
          FFMPEG_PKG_CONFIG_PATH: ${{ runner.temp }}/ffmpeg/install/lib/pkgconfig
          FFMPEG_INCLUDE_DIR: ${{ runner.temp }}/ffmpeg/install/include
          FFMPEG_DYN_DIR: ${{ runner.temp }}/ffmpeg/install/lib
          LD_LIBRARY_PATH: ${{ runner.temp }}/ffmpeg/install/lib
          PKG_CONFIG_PATH: ${{ runner.temp }}/ffmpeg/install/lib/pkgconfig
        run: cargo test --lib --bins

  macos:
    name: macos (build + clippy + test)
    runs-on: macos-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime dependencies (Homebrew)
        # macOS dylibs in install/ have absolute LC_LOAD_DYLIB paths into
        # /opt/homebrew/opt/<dep>/lib/. Without these brew packages, dyld
        # fails when loading any binary linking libavformat.
        run: |
          brew update
          brew install \
            pkg-config zstd \
            x264 x265 dav1d svt-av1 libvpx aom \
            opus libvorbis lame fdk-aac theora libsoxr libopenmpt \
            libass freetype fribidi harfbuzz fontconfig \
            libbluray webp zimg chromaprint srt openjpeg jpeg-xl \
            zvbi \
            vulkan-headers vulkan-loader molten-vk libplacebo shaderc glslang

      - name: Download ffmpeg install (macos)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/ffmpeg"
          gh release download "$FFMPEG_RELEASE_TAG" \
            -R "$FFMPEG_REPO" \
            -p install-macos-arm64.tar.zst \
            -O "$RUNNER_TEMP/ffmpeg/install-macos-arm64.tar.zst"
          tar --zstd -xf "$RUNNER_TEMP/ffmpeg/install-macos-arm64.tar.zst" -C "$RUNNER_TEMP/ffmpeg"
          ls -la "$RUNNER_TEMP/ffmpeg/install/lib/pkgconfig"
          cat "$RUNNER_TEMP/ffmpeg/install/META.txt" || true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo clippy
        env:
          FFMPEG_PKG_CONFIG_PATH: ${{ runner.temp }}/ffmpeg/install/lib/pkgconfig
          FFMPEG_INCLUDE_DIR: ${{ runner.temp }}/ffmpeg/install/include
          FFMPEG_DYN_DIR: ${{ runner.temp }}/ffmpeg/install/lib
          DYLD_FALLBACK_LIBRARY_PATH: ${{ runner.temp }}/ffmpeg/install/lib
          PKG_CONFIG_PATH: ${{ runner.temp }}/ffmpeg/install/lib/pkgconfig
        run: cargo clippy --lib --bins --tests -- -D warnings

      - name: cargo build
        env:
          FFMPEG_PKG_CONFIG_PATH: ${{ runner.temp }}/ffmpeg/install/lib/pkgconfig
          FFMPEG_INCLUDE_DIR: ${{ runner.temp }}/ffmpeg/install/include
          FFMPEG_DYN_DIR: ${{ runner.temp }}/ffmpeg/install/lib
          DYLD_FALLBACK_LIBRARY_PATH: ${{ runner.temp }}/ffmpeg/install/lib
          PKG_CONFIG_PATH: ${{ runner.temp }}/ffmpeg/install/lib/pkgconfig
        run: cargo build --lib --bins --tests

      - name: cargo test
        env:
          FFMPEG_PKG_CONFIG_PATH: ${{ runner.temp }}/ffmpeg/install/lib/pkgconfig
          FFMPEG_INCLUDE_DIR: ${{ runner.temp }}/ffmpeg/install/include
          FFMPEG_DYN_DIR: ${{ runner.temp }}/ffmpeg/install/lib
          DYLD_FALLBACK_LIBRARY_PATH: ${{ runner.temp }}/ffmpeg/install/lib
          PKG_CONFIG_PATH: ${{ runner.temp }}/ffmpeg/install/lib/pkgconfig
        run: cargo test --lib --bins

  windows:
    name: windows (build + clippy + test)
    runs-on: windows-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - name: Download ffmpeg install (windows)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/ffmpeg"
          gh release download "$FFMPEG_RELEASE_TAG" \
            -R "$FFMPEG_REPO" \
            -p install-windows.tar.zst \
            -O "$RUNNER_TEMP/ffmpeg/install-windows.tar.zst"
          # windows-latest ships bsdtar which handles zstd via --use-compress-program=zstd.
          # cd into the target dir first because git-bash tar misparses drive-letter
          # paths like "D:\..." even with --force-local when passed via -C.
          cd "$RUNNER_TEMP/ffmpeg"
          tar --force-local --use-compress-program=zstd -xf install-windows.tar.zst
          ls "$RUNNER_TEMP/ffmpeg/install-windows/bin"
          ls "$RUNNER_TEMP/ffmpeg/ffmpeg-binding-windows"
          cat "$RUNNER_TEMP/ffmpeg/install-windows/META.txt" || true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
          components: clippy, rustfmt

      - name: Install MinGW
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64
          static: 0

      - uses: Swatinem/rust-cache@v2

      - name: cargo clippy / build / test
        shell: pwsh
        env:
          FFMPEG_LIBS_DIR: ${{ runner.temp }}\ffmpeg\install-windows\lib
          FFMPEG_INCLUDE_DIR: ${{ runner.temp }}\ffmpeg\install-windows\include
          FFMPEG_DLL_PATH: ${{ runner.temp }}\ffmpeg\install-windows\bin
          FFMPEG_LINK_MODE: dynamic
          FFMPEG_BINDING_PATH: ${{ runner.temp }}\ffmpeg\ffmpeg-binding-windows\binding.rs
        run: |
          $env:PATH = "${{ runner.temp }}\ffmpeg\install-windows\bin;" + $env:PATH
          cargo clippy --target x86_64-pc-windows-gnu --lib --bins --tests -- -D warnings
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cargo build --target x86_64-pc-windows-gnu --lib --bins --tests
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cargo test --target x86_64-pc-windows-gnu --lib --bins
          exit $LASTEXITCODE
